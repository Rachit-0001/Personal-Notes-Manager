<!-- FILE: frontend/index.html -->
<!-- Login Page -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Notes Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="logo">📝 NoteSpace</div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to access your notes</p>

    <!-- Error / success message box -->
    <div class="alert alert-error" id="alertBox"></div>

    <!-- Login Form -->
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" />
    </div>

    <button class="btn btn-primary" onclick="handleLogin()" id="loginBtn">
      Sign In
    </button>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // If already logged in, go to dashboard
    if (localStorage.getItem("token")) {
      window.location.href = "dashboard.html";
    }

    // Handle login form submission
    async function handleLogin() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("loginBtn");
      const alertBox = document.getElementById("alertBox");

      // Hide any old messages
      hideAlert(alertBox);

      // Basic check
      if (!email || !password) {
        showAlert(alertBox, "Please enter your email and password.", "error");
        return;
      }

      // Disable button while loading
      btn.textContent = "Signing in...";
      btn.disabled = true;

      try {
        const res = await fetch(`${API_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (res.ok) {
          // Save token and user info to localStorage
          localStorage.setItem("token", data.token);
          localStorage.setItem("user", JSON.stringify(data.user));
          // Go to dashboard
          window.location.href = "dashboard.html";
        } else {
          showAlert(alertBox, data.message || "Login failed.", "error");
        }
      } catch (err) {
        showAlert(alertBox, "Cannot connect to server. Is the backend running?", "error");
      }

      btn.textContent = "Sign In";
      btn.disabled = false;
    }

    // Allow pressing Enter to login
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleLogin();
    });
  </script>
</body>
</html>
